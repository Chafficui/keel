name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      packages: ${{ steps.filter.outputs.packages }}
      cli: ${{ steps.filter.outputs.cli }}
      docker: ${{ steps.filter.outputs.docker }}
      lockfile: ${{ steps.filter.outputs.lockfile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            packages:
              - 'packages/**'
              - 'tsconfig.base.json'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.prettierrc'
              - 'vitest.config.ts'
            cli:
              - 'cli/**'
            docker:
              - 'packages/backend/Dockerfile'
              - 'packages/**'
              - 'tsconfig.base.json'
              - 'package.json'
              - 'package-lock.json'
            lockfile:
              - 'package-lock.json'
              - 'cli/package-lock.json'

  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm ci

      - name: Build workspace packages
        run: npm run build:shared && npm run build:email

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check "packages/*/src/**/*.{ts,tsx}"

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm ci

      - name: Build workspace packages
        run: npm run build:shared && npm run build:email

      - name: Typecheck
        run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.packages == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm ci

      - name: Build workspace packages
        run: npm run build:shared && npm run build:email

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  cli:
    name: CLI Build & Test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci || npm ci

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Run CLI tests
        working-directory: cli
        run: npm test

      - name: Verify CLI entry points exist
        working-directory: cli
        run: |
          test -f dist/create.js || (echo "Missing dist/create.js" && exit 1)
          test -f dist/manage.js || (echo "Missing dist/manage.js" && exit 1)
          echo "CLI entry points verified"

  build:
    name: Full Build
    runs-on: ubuntu-latest
    needs: [lint-and-format, typecheck, test, cli]
    if: |
      always() &&
      (needs.lint-and-format.result == 'success' || needs.lint-and-format.result == 'skipped') &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (needs.cli.result == 'success' || needs.cli.result == 'skipped') &&
      (needs.lint-and-format.result == 'success' || needs.typecheck.result == 'success' || needs.test.result == 'success' || needs.cli.result == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm ci

      - name: Full production build
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [changes, lint-and-format, typecheck, test]
    if: |
      always() &&
      needs.changes.outputs.docker == 'true' &&
      (needs.lint-and-format.result == 'success' || needs.lint-and-format.result == 'skipped') &&
      (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.lockfile == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || npm ci

      - name: Audit dependencies
        run: npm audit --omit=dev
        continue-on-error: true

      - name: Audit CLI dependencies
        working-directory: cli
        run: (npm ci || npm ci) && npm audit --omit=dev
        continue-on-error: true
